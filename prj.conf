# =============================================================================
# SmartGateway — FRDM-MCXN947 + MAYA-W166(IW416), WiFi 우선(WPA2/WPA3 AUTO) → ETH 폴백
#
# 시퀀스(netmgr): WiFi 최대 3회 → 이더넷 최대 3회 → 둘 다 실패 시 대기 후 다시 WiFi부터
# 통합 빌드: SMARTGATEWAY_WIFI_ONLY_TEST 사용 안 함(기본 OFF). WiFi-only 검증만 ON.
#
# 빌드:
#   west build -b frdm_mcxn947/mcxn947/cpu0 --pristine

# ---- 공통 -------------------------------------------------------------------
CONFIG_SMARTGATEWAY_LINE_ID="KRWJARDU001"
CONFIG_SMARTGATEWAY_PROTO_DEVICE_ID=0

# ---- TCP 공통 옵션 ----------------------------------------------------------
CONFIG_SMARTGATEWAY_TCP_MODBUS_GATEWAY=y
CONFIG_SMARTGATEWAY_TCP_CLIENT_MODE=y
# 클라이언트 폴백 peer (netmgr+NVS가 우선; 보통 WiFi PC 와 동일)
CONFIG_SMARTGATEWAY_TCP_PEER_IP="192.168.88.3"
CONFIG_SMARTGATEWAY_TCP_PEER_PORT=19195
CONFIG_SMARTGATEWAY_TCP_RECONNECT_MS=3000
# TCP 클라이언트 모드가 아니면 SMARTGATEWAY_TCP_RECONNECT_MS 는 비활성 — 설정 시 Kconfig 경고
CONFIG_SMARTGATEWAY_TCP_HANDSHAKE_POLL_MS=2000
CONFIG_SMARTGATEWAY_TCP_MAX_BODY=256
CONFIG_SMARTGATEWAY_TCP_RS232_RX_TIMEOUT_MS=10000
CONFIG_SMARTGATEWAY_TCP_RS232_INTER_FRAME_GAP_MS=1500
# 한 프레임 최소(5+256+2)보다 크게만 유지 — 512→384 로 정적 RAM 128B 절약
CONFIG_SMARTGATEWAY_TCP_STREAM_BUF=384
CONFIG_SMARTGATEWAY_TCP_START_DELAY_MS=5000

# ── IPv4 분할 프로파일 (NVS도 동일 구조로 저장·메뉴 편집) ────────────────────
#   WiFi 모드(NVS net_boot_mode=0): 보드 192.168.88.100 / PC 192.168.88.3 / TCP 20273
#   ETH 모드(NVS net_boot_mode=1): 보드 10.108.214.150 / PC 10.108.214.100 / TCP 20273
#   유선·무선 인터페이스는 Zephyr에서 별도; NVS의 wifi_* 와 eth_* 는 각 모드에서만 사용.
# NVS/시리얼 메뉴로 WiFi·이더넷 선택하려면 아래 둘 다 끄기(켜 있으면 매 부팅 NVS 덮어씀).

# =============================================================================
# ETH 프로파일 (유선 RJ45 — CONFIG_SMARTGATEWAY_ETH_*)
#  - 보드 ETH IP (SMARTGATEWAY_ETH_STATIC_*)
#  - UDP/TCP peer (ETH_*)
# =============================================================================
CONFIG_SMARTGATEWAY_ETH_STATIC_IP="10.108.214.150"
CONFIG_SMARTGATEWAY_ETH_STATIC_NETMASK="255.255.255.0"
CONFIG_SMARTGATEWAY_ETH_STATIC_GW="10.108.214.1"
# ETH UDP peer
CONFIG_SMARTGATEWAY_ETH_UDP_PEER_IP="10.108.214.100"
CONFIG_SMARTGATEWAY_ETH_UDP_PEER_PORT=19197
CONFIG_SMARTGATEWAY_ETH_UDP_BIND_PORT=0
# ETH TCP peer
CONFIG_SMARTGATEWAY_ETH_TCP_PEER_IP="10.108.214.100"
CONFIG_SMARTGATEWAY_ETH_TCP_PEER_PORT=19195

# =============================================================================
# WiFi 프로파일 (무선 IW416 — CONFIG_SMARTGATEWAY_WIFI_* , WIFI_ENABLE 시)
#  - 보드 WiFi IP (WIFI_STATIC_*)
#  - UDP/TCP peer (WIFI_*)
#
# 현재 시험 요구: WPA2/WPA3 AUTO. SCANNING 고착 시 앱 설정만으로 한계일 수 있음 → 아래 엔지니어링 대응.
#   - NXP IW416 + Zephyr wifi/wpa_supplicant 이슈 재현 패키지(로그·보드·SDK SHA)로 벤더 티켓
#   - Zephyr/NXP SDK·모노리식 WiFi 펌 업데이트 후 재검증
#   - SMARTGATEWAY_WIFI_ONLY_TEST 빌드로 ETH 제외 시 연결 여부( RAM/드라이버 분리 )
#   - PMF: REQUIRED(y)/OPTIONAL(n) 만 번갈아 시험(공유기 고급 802.11w 설정과 일치시키기)
# =============================================================================
CONFIG_SMARTGATEWAY_WIFI_SSID="HLMando2G"
CONFIG_SMARTGATEWAY_WIFI_PSK="HLmando2"
# WPA2/WPA3 혼합 AP 대응: WPA_AUTO_PERSONAL (로그 security=10).
CONFIG_SMARTGATEWAY_WIFI_SECURITY_WPA_AUTO=y
# CONFIG_SMARTGATEWAY_WIFI_SECURITY_WPA3 is not set
# PMF: 공유기가 필수 PMF면 y 로 시험. register_frame 미지원 로그와 충돌 시 n 유지 후 NXP 문의.
# WiFi 첫 시도 전 지연(ms): NVS/콘솔·WPA2/WPA3·통합 빌드 crypto/RAM 피크 분산
CONFIG_SMARTGATEWAY_DEFER_WIFI_CONNECT_MS=2000
# HLMando2G 등 2.4 전용 SSID: 듀얼밴드 스캔(SCANNING 고착) 회피
CONFIG_SMARTGATEWAY_WIFI_SCAN_BAND_2_4_GHZ=y
# AP 채널을 알면 1~13 지정(0=전 채널 스캔)
# 스캔으로 채널 고정 후 SCANNING 고착 시 — wifi_manager 가 동일 시도 내 WIFI_CHANNEL_ANY 재시도
CONFIG_SMARTGATEWAY_WIFI_FIXED_CHANNEL=0

# 공유기 LAN 192.168.88.0/24 (게이트웨이 .1). 보드 정적 IP는 DHCP와 겹치지 않게 설정.
CONFIG_SMARTGATEWAY_WIFI_STATIC_IP="192.168.88.100"
CONFIG_SMARTGATEWAY_WIFI_STATIC_NETMASK="255.255.255.0"
CONFIG_SMARTGATEWAY_WIFI_STATIC_GW="192.168.88.1"

# TCP/UDP 서버가 떠 있는 PC (동일 서브넷, 예: 192.168.88.3)
CONFIG_SMARTGATEWAY_WIFI_UDP_PEER_IP="192.168.88.3"
CONFIG_SMARTGATEWAY_WIFI_UDP_PEER_PORT=19197
CONFIG_SMARTGATEWAY_WIFI_UDP_BIND_PORT=19197
CONFIG_SMARTGATEWAY_WIFI_TCP_PEER_IP="192.168.88.3"
CONFIG_SMARTGATEWAY_WIFI_TCP_PEER_PORT=19195

# =============================================================================
# RS-232
# =============================================================================
CONFIG_SMARTGATEWAY_RS232_ENABLE=y
CONFIG_SMARTGATEWAY_RS232_BAUD_RATE=115200
CONFIG_SMARTGATEWAY_RS232_DATA_BITS_8=y
CONFIG_SMARTGATEWAY_RS232_PARITY_NONE=y
CONFIG_SMARTGATEWAY_RS232_STOP_BITS_1=y
CONFIG_SMARTGATEWAY_RS232_FLOW_CTRL_NONE=y
CONFIG_SMARTGATEWAY_RS232_UDP_LISTEN_PORT=20263
CONFIG_SMARTGATEWAY_RS232_MODBUS_POST_TX_DELAY_MS=2

CONFIG_SPI=y
# DMA 채널 미설정 → CPU 폴링 모드 강제 (DMA 사용 시 HardFault)
CONFIG_SPI_NXP_LPSPI_DMA=n
# printf %f 지원 활성화
CONFIG_CBPRINTF_FP_SUPPORT=y
# AD7327 외부 SPI ADC 8채널 (±10V, LPSPI6 FlexComm6)
CONFIG_SMARTGATEWAY_ADC_CHANNEL_COUNT=8

# main(): printf·NVS·netmgr 대기 — 1792에서 스택 침범 시 부팅 로그/동작 이상 가능
CONFIG_MAIN_STACK_SIZE=2560
CONFIG_REGULATOR=y
CONFIG_GPIO=y
CONFIG_MDIO=y

# =============================================================================
# NVS + 부팅 콘솔 설정 메뉴
# =============================================================================
CONFIG_NVS=y
CONFIG_REBOOT=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y

# =============================================================================
# WiFi 드라이버 — ETH 단독 테스트 시 아래 전체를 n/주석 처리
# =============================================================================
CONFIG_WIFI=y
CONFIG_WIFI_NXP=y
CONFIG_NXP_MONOLITHIC_WIFI=y
CONFIG_NXP_IW416=y
CONFIG_NXP_IW416_UBX_MAYA_W1_USD=y
CONFIG_NXP_IW416_REGION_WW=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_CRYPTO_ALT=y
# WPA2/WPA3 + TLS: mbedTLS·hostap RAM 피크 — 힙·WPA 스택 우선 (ETH 폴백은 net_buf 일부로 재분배)
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_MD_C=y
CONFIG_MBEDTLS_PKCS5_C=y
CONFIG_MBEDTLS_SHA1=y
# WPA supplicant thread stack: 10240/11264/12288 failed to connect; 13312 (field test)
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=13312
# 링크 통과: WPA2/WPA3 피크에서 malloc 실패 시 소폭 상향(그 전에 NET_BUF/스택 로그 확인)
# RAM noinit overflow(~수백 B) 시 힙 소폭 감소 — WPA3 연결 실패 로그 나오면 +256~512 만 되돌림
CONFIG_HEAP_MEM_POOL_SIZE=59392
# 소프트 로밍 off: 코드·런타임 RAM 절약, 초기 연결 시 백그라운드 스캔 경합 완화
CONFIG_NXP_WIFI_ROAMING=n
CONFIG_NXP_WIFI_CSI=n
CONFIG_NXP_WIFI_IPV6=n
# Dual-band WiFi is required; keep 5 GHz enabled and limit only scan entries.
CONFIG_NXP_WIFI_MAX_AP_ENTRIES=4
CONFIG_NXP_WIFI_5GHz_SUPPORT=y
CONFIG_NXP_WIFI_WLCMGR_TASK_STACK_SIZE=5120
CONFIG_NXP_WIFI_MON_TASK_STACK_SIZE=3072
CONFIG_NXP_WIFI_DRIVER_TASK_STACK_SIZE=2048

# =============================================================================
# 네트워크 스택
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=8
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
# NXP WiFi 미들웨어가 net_dhcpv4_* 심볼을 참조하므로 활성 유지 필요
CONFIG_NET_DHCPV4=y
# 이더넷+TCP(게이트웨이) 동시에 NET 스레드 부하 증가 — 1536→2048, TCP 워크큐·ENET RX 상향
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_TCP_WORKQ_STACK_SIZE=2048
CONFIG_ETH_NXP_ENET_QOS_RX_THREAD_STACK_SIZE=2048

# NET_CONFIG_SETTINGS 비활성: IP 자동 할당 없음, 30초 부팅 지연 없음
# network_manager.c 가 ETH/WiFi IP를 직접 할당한다.
CONFIG_NET_CONFIG_SETTINGS=n

# Hostname is selected by the socket/POSIX network stack.
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="smartgateway"

CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=1280
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_WIFI_LOG_LEVEL_INF=y
# eth_nxp_enet_qos_mac: RECV failed on pkt (LOG_WRN) 숨김 — PHY는 CONFIG_PHY_LOG_LEVEL 유지
CONFIG_ETHERNET_LOG_LEVEL_ERR=y
CONFIG_SDHC_LOG_LEVEL_WRN=y
CONFIG_SD_LOG_LEVEL_WRN=y

# =============================================================================
# DNS 도메인 테스트 모드
# 활성화: CONFIG_SMARTGATEWAY_DNS_TEST_MODE=y 주석 해제
# 비활성: 기존 IP 기반 접속 (ETH/WiFi 각 NVS 프로파일 사용)
# =============================================================================
CONFIG_SMARTGATEWAY_DNS_TEST_MODE=n
CONFIG_SMARTGATEWAY_DNS_TEST_DOMAIN="dev.teia.co.kr"
CONFIG_SMARTGATEWAY_DNS_TEST_PORT=19198
# DNS 테스트 모드 활성화 시 자동으로 DNS_RESOLVER 선택됨 (Kconfig select)
# DNS_RESOLVER 추가 옵션 (테스트 모드 ON 시 적용)
# CONFIG_DNS_RESOLVER_MAX_SERVERS=2
