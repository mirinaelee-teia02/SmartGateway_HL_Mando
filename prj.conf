# =============================================================================
# SmartGateway 설정 (prj.conf)
# =============================================================================
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  동작 모드 전환 — 아래 한 줄만 =y 로 설정                               │
# │    CONFIG_SMARTGATEWAY_NET_MODE_ETH_ONLY=y   → 이더넷 전용             │
# │    CONFIG_SMARTGATEWAY_NET_MODE_WIFI_ONLY=y  → WiFi 전용               │
# │    CONFIG_SMARTGATEWAY_NET_MODE_BOTH=y       → 이더넷 + WiFi 동시      │
# │                                                                         │
# │  자동 결정: WIFI_ENABLE, NET_CONFIG_SETTINGS(이더넷 IP 자동 설정)       │
# │  수동 유지: WiFi 드라이버 섹션 (이더넷 전용 시 주석)                    │
# └─────────────────────────────────────────────────────────────────────────┘
CONFIG_SMARTGATEWAY_NET_MODE_WIFI_ONLY=y
# CONFIG_SMARTGATEWAY_NET_MODE_ETH_ONLY=y
# CONFIG_SMARTGATEWAY_NET_MODE_BOTH=y

# --- 공통 -------------------------------------------------------------------
CONFIG_SMARTGATEWAY_LINE_ID="KRWJARDU001"
CONFIG_SMARTGATEWAY_UDP_TEST_MODE=y
CONFIG_SMARTGATEWAY_PROTO_DEVICE_ID=1

# =============================================================================
# 이더넷 (ENET) — 10.108.214.x  (NET_MODE_ETH_ONLY / BOTH 에서 자동 활성)
# =============================================================================

# 보드 로컬 IP
CONFIG_NET_CONFIG_INIT_TIMEOUT=0
CONFIG_NET_CONFIG_MY_IPV4_ADDR="10.108.214.150"
CONFIG_NET_CONFIG_MY_IPV4_GW="10.108.214.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"

# 이더넷 UDP
CONFIG_SMARTGATEWAY_ETH_UDP_PEER_IP="10.108.214.100"
CONFIG_SMARTGATEWAY_ETH_UDP_PEER_PORT=20263
CONFIG_SMARTGATEWAY_ETH_UDP_BIND_PORT=0

# 이더넷 TCP
CONFIG_SMARTGATEWAY_ETH_TCP_BIND_IP="10.108.214.150"
CONFIG_SMARTGATEWAY_ETH_TCP_LISTEN_PORT=20273

# =============================================================================
# WiFi (NXP IW416 / u-blox EVK-MAYA-W166) — 192.168.5.x
# =============================================================================

# AP 연결 (WIFI_ENABLE 은 NET_MODE 에서 자동 결정)
#CONFIG_SMARTGATEWAY_WIFI_SSID="TEIA-R&D-Center"
#CONFIG_SMARTGATEWAY_WIFI_PSK="teia0323!"
CONFIG_SMARTGATEWAY_WIFI_SSID="HLMando5G"
CONFIG_SMARTGATEWAY_WIFI_PSK="HLmando5"
# WPA2/WPA3 자동 (AP 보안에 따라 자동 선택)
CONFIG_SMARTGATEWAY_WIFI_SECURITY_WPA_AUTO=y #WPA2 호환
#CONFIG_SMARTGATEWAY_WIFI_SECURITY_WPA3=y #WPA3 전용

# 보드 로컬 IP
CONFIG_SMARTGATEWAY_WIFI_STATIC_IP="192.168.88.100"
CONFIG_SMARTGATEWAY_WIFI_STATIC_NETMASK="255.255.255.0"
CONFIG_SMARTGATEWAY_WIFI_STATIC_GW="192.168.88.1"

# WiFi UDP
#CONFIG_SMARTGATEWAY_WIFI_UDP_PEER_IP="192.168.5.78"
CONFIG_SMARTGATEWAY_WIFI_UDP_PEER_IP="192.168.88.3"
CONFIG_SMARTGATEWAY_WIFI_UDP_PEER_PORT=20263
CONFIG_SMARTGATEWAY_WIFI_UDP_BIND_PORT=20263

# WiFi TCP
CONFIG_SMARTGATEWAY_WIFI_TCP_BIND_IP="192.168.5.100"
CONFIG_SMARTGATEWAY_WIFI_TCP_LISTEN_PORT=20273

# =============================================================================
# TCP Modbus 게이트웨이 (공통 프로토콜 파라미터)
# =============================================================================
CONFIG_SMARTGATEWAY_TCP_MODBUS_GATEWAY=y
CONFIG_SMARTGATEWAY_TCP_CLIENT_MODE=n
CONFIG_SMARTGATEWAY_TCP_HANDSHAKE_POLL_MS=2000
CONFIG_SMARTGATEWAY_TCP_MAX_BODY=256
CONFIG_SMARTGATEWAY_TCP_RS232_RX_TIMEOUT_MS=10000
CONFIG_SMARTGATEWAY_TCP_RS232_INTER_FRAME_GAP_MS=1500
CONFIG_SMARTGATEWAY_TCP_STREAM_BUF=512

# =============================================================================
# RS-232
# =============================================================================
CONFIG_SMARTGATEWAY_RS232_ENABLE=y
CONFIG_SMARTGATEWAY_RS232_BAUD_RATE=115200
CONFIG_SMARTGATEWAY_RS232_DATA_BITS_8=y
CONFIG_SMARTGATEWAY_RS232_PARITY_NONE=y
CONFIG_SMARTGATEWAY_RS232_STOP_BITS_1=y
CONFIG_SMARTGATEWAY_RS232_FLOW_CTRL_NONE=y
CONFIG_SMARTGATEWAY_RS232_UDP_LISTEN_PORT=20263
CONFIG_SMARTGATEWAY_RS232_MODBUS_POST_TX_DELAY_MS=2

# =============================================================================
# ADC
# =============================================================================
CONFIG_ADC=y           # 내부 LPADC0 검증 모드
# CONFIG_SPI=y         # AD7327 외부 SPI 사용 시 교체
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_REGULATOR=y

# =============================================================================
# WiFi 드라이버  ★ 이더넷 전용 모드: 아래 블록 전체 주석 처리
# =============================================================================
CONFIG_WIFI=y
CONFIG_WIFI_NXP=y
CONFIG_NXP_MONOLITHIC_WIFI=y
CONFIG_NXP_IW416=y
CONFIG_NXP_IW416_UBX_MAYA_W1_USD=y
CONFIG_NXP_IW416_REGION_WW=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_HEAP_MEM_POOL_SIZE=102400
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=14336

# =============================================================================
# 네트워크 스택
# =============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
# ★ 이더넷 전용 = 1 | WiFi 포함(WiFi 전용/이더넷+WiFi) = 2  ← ETH 하드웨어가 항상 존재
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048

# =============================================================================
# 로그
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_WIFI_LOG_LEVEL_INF=y
CONFIG_SDHC_LOG_LEVEL_WRN=y
CONFIG_SD_LOG_LEVEL_WRN=y
