# 프래그먼트: prj.conf 이후 병합 — 이더넷만으로 L2·정적 IP·TCP/UDP 검증
#   west build ... -d build-eth --pristine -- -DSMARTGATEWAY_ETH_ONLY_TEST=ON
#
# WiFi 드라이버·blob 비활성 (hal wireless CMake 가 IW416 blob 을 찾지 않게 NXP_MONOLITHIC_WIFI=n 필수)
CONFIG_WIFI=n
CONFIG_NXP_MONOLITHIC_WIFI=n

# ETH 단독이면 힙 여유 (링크 실패 시 이전 통합 빌드 값에 맞춤)
CONFIG_HEAP_MEM_POOL_SIZE=49152
